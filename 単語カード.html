<!DOCTYPE html><html data-theme="dark" lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>単語カード</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{--bg:#0d0f1a;--bg2:#13162a;--s:#1e2340;--s2:#252b4a;--bd:#2e3560;--a:#7c6af7;--a2:#a78bfa;--ag:rgba(124,106,247,.3);--pk:#f472b6;--g:#fbbf24;--t:#e8eaf6;--t2:#9ba3c8;--t3:#5a6390;--rd:#f87171;--ra:16px}

*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}

.cjp{font-family:'Noto Serif JP',serif;font-size:44px;font-weight:700;text-align:center;line-height:1.3}.crdn{font-family:'Noto Sans JP',sans-serif;font-size:16px;color:var(--a2);margin-top:8px;text-align:center}.ccn{font-size:24px;font-weight:600;text-align:center;line-height:1.4}
.ctap{font-size:12px;color:var(--t3);margin-top:10px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}.ttsbtn{position:absolute;bottom:12px;right:12px;background:rgba(124,106,247,.15);border:1px solid var(--a);color:var(--a2);border-radius:7px;padding:4px 9px;font-size:12px;cursor:pointer;transition:.2s;z-index:2}.ttsbtn:hover{background:var(--a);color:#fff}

.fjp{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;margin-bottom:4px}.frd{font-size:12px;color:var(--a2);margin-bottom:4px;font-family:'Noto Sans JP',sans-serif}.fcn{font-size:13px;color:var(--t2)}.fdl{position:absolute;top:9px;right:9px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;transition:.2s;padding:3px}.fdl:hover{color:var(--rd)}
.ftbs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}.ftb{padding:5px 11px;border-radius:20px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:.2s}.ftb.on{background:var(--a);border-color:var(--a);color:#fff}

#MC{background:var(--s);border:1px solid var(--bd);border-radius:22px;padding:34px 38px;max-width:460px;width:100%;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.5);text-align:center;animation:su .25s ease}@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.mjp{font-family:'Noto Serif JP',serif;font-size:56px;font-weight:700;margin-bottom:10px;line-height:1.2}.mrd{font-size:20px;color:var(--a2);margin-bottom:12px;font-family:'Noto Sans JP',sans-serif}.mcn{font-size:18px;font-weight:600;color:var(--t2);margin-bottom:16px}.mcl{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:20px;transition:.2s;padding:4px}.mcl:hover{color:var(--t)}
.bb{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--bd);color:var(--t);padding:10px 16px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;display:flex;align-items:center;gap:6px}.toast.show{transform:translateX(-50%) translateY(0)}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.ani{animation:fu .25s ease}
@media(max-width:600px){.cjp{font-size:32px}.fc{height:260px}}
</style></head>
